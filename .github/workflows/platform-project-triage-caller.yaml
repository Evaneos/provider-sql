# Caller du triage automatique. Ce fichier est identique dans tous les repos
# d'infra platform. Pour déployer sur un nouveau repo : copier ce fichier et
# ajouter le secret PLATFORM_TRIAGE_TOKEN (voir scripts/rotate-platform-triage-token.sh).
# Doc : https://github.com/Evaneos/team-platform/issues/239
---
name: "Triage Platform"

"on":
  issues:
    types:
      - opened
      - reopened
      - closed
  pull_request:
    types:
      - opened
      - reopened
      - closed
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      item_number:
        description: "Numéro de l'issue ou de la PR"
        required: true
        type: number

permissions:
  contents: read

jobs:
  triage:
    # Dependabot a son propre store de secrets et n'a pas accès à
    # PLATFORM_TRIAGE_TOKEN, le triage échouerait. Renovate (GitHub App)
    # tourne dans un workflow normal et a accès aux secrets du repo.
    if: github.actor != 'dependabot[bot]'
    uses: evaneos/team-platform/.github/workflows/triage.yaml@main
    with:
      item_number: ${{ github.event.issue.number || github.event.pull_request.number || fromJSON(github.event.inputs.item_number) }}
      repository_name: ${{ github.event.repository.name }}
    secrets:
      PLATFORM_TRIAGE_TOKEN: ${{ secrets.PLATFORM_TRIAGE_TOKEN }}
